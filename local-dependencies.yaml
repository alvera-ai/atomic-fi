services:
  watchman:
    image: moov/watchman:v0.61.1
    ports:
      - "8084:8084"
      - "9094:9094"
    volumes:
      - ./config.all-lists.yml:/app/config.yml:ro
      - ./custom-watchlist.jsonl:/data/custom_watchlist.jsonl:ro
    environment:
      APP_CONFIG: /app/config.yml

  # ZenRule — GoRules Agent (open source, MIT): headless rules engine over REST.
  # Built from the vendored subtree at external-deps/zenrule (GoRules publishes
  # amd64-only images; building locally gives a native image on arm64).
  # Loads JSON Decision Model (JDM) files from priv/zenrule/<project>/<decision>.json
  # (bind-mounted; the agent polls + hot-reloads every POLL_INTERVAL ms).
  # Evaluate: POST /api/projects/atomic-fi/evaluate/<decision>.json  body {"context": {...}}
  zenrule:
    build:
      context: ./external-deps
      dockerfile: zenrule.Dockerfile
    image: gorules/agent:local
    ports:
      - "8090:8080"
    volumes:
      - ./priv/zenrule:/home/nonroot/data:ro
    environment:
      PROVIDER__TYPE: Filesystem

  # copilot-runtime — generic CopilotKit v2 runtime sidecar (see ADR-002).
  # CopilotKit ships @copilotkit/runtime as library middleware, not an image,
  # so this is built from the vendored source at external-deps/copilot-runtime.
  # Behaviour — provider, model, base URL — is controlled entirely by
  # docker.env (env_file), the same "config from a file" pattern as watchman's
  # mounted config.yml. Edit docker.env + `docker compose up -d` to change it;
  # no rebuild. host.docker.internal lets the container reach Ollama on the
  # host (no-op on Docker Desktop, host-gateway on Linux).
  # CopilotKit client posts to: POST /api/copilotkit
  copilot-runtime:
    build:
      context: ./external-deps/copilot-runtime
    image: atomic-fi/copilot-runtime:local
    # Host port 4242 (container still listens on 4111 internally).
    # 4111 is intentionally left free for the old worktree's v1 runtime
    # so the two can run side-by-side for v1↔v2 comparison.
    ports:
      - "4242:4111"
    env_file:
      - ./external-deps/copilot-runtime/docker.env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # copilot-telemetry — Vector sidecar (see ADR-002). copilot-runtime's
  # COPILOTKIT_TELEMETRY_URL (in docker.env) points here, so CopilotKit's
  # /ingest telemetry is captured locally instead of going to
  # telemetry.copilotkit.ai. Default sink: console — events show up in
  # `docker compose -f local-dependencies.yaml logs copilot-telemetry`.
  # Switch the backend by editing vector.yaml; no rebuild.
  copilot-telemetry:
    image: timberio/vector:0.55.0-alpine
    ports:
      - "8686:8686"
    volumes:
      - ./external-deps/copilot-telemetry/vector.yaml:/etc/vector/vector.yaml:ro
