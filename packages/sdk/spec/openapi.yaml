          format: uuid
          nullable: true
          type: string
          x-struct:
          x-validate:
        opening_balance:
          description: Balance at period start in minor currency units (camt:053 <Bal> OpeningBooked)
          nullable: true
          type: integer
          x-struct:
          x-validate:
        payment_account_id:
          description: PaymentAccount scoping this snapshot (camt:052/053 <Acct>)
          format: uuid
          nullable: true
          type: string
          x-struct:
          x-validate:
        period_end:
          description: End of the reporting period (inclusive)
          format: date-time
          type: string
          x-struct:
          x-validate:
        period_start:
          description: Start of the reporting period (inclusive)
          format: date-time
          type: string
          x-struct:
          x-validate:
        review_reason:
          description: Human-readable description of why this snapshot was flagged for AML review
          nullable: true
          type: string
          x-struct:
          x-validate:
        sar_reference:
          description: SAR (Suspicious Activity Report) filing reference (FinCEN SAR form 111)
          nullable: true
          type: string
          x-struct:
          x-validate:
        snapshot_type:
          description: Reporting period type — intraday maps to camt:052 (on-demand report); daily/weekly/monthly map to camt:053 (periodic statement)
          enum:
            - intraday
            - daily
            - weekly
            - monthly
          type: string
          x-struct:
          x-validate:
        status:
          description: Snapshot lifecycle status — pending (queued), computed (aggregates ready), published (sent to downstream / regulatory reporting)
          enum:
            - pending
            - computed
            - published
          nullable: true
          type: string
          x-struct:
          x-validate:
        tenant_id:
          format: uuid
          type: string
          x-struct:
          x-validate:
        total_credit_amount:
          description: Total credit amount in minor currency units (camt:052/053 <TtlNtries> TtlCdtNtries Amt)
          type: integer
          x-struct:
          x-validate:
        total_credit_count:
          description: Number of credit entries in the period (camt:052/053 <TtlNtries> CdtNb)
          type: integer
          x-struct:
          x-validate:
        total_debit_amount:
          description: Total debit amount in minor currency units (camt:052/053 <TtlNtries> TtlDbtNtries Amt)
