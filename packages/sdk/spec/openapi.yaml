      description: Account activity snapshot — periodic summary of debit/credit activity for an AccountHolder. Maps to ISO 20022 camt:052 (intraday account report) and camt:053 (account statement). AML fields (flagged_for_review, review_reason, sar_reference) support FinCEN SAR filing under 31 CFR §1020.320.
      example:
        account_holder_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        closing_balance: 0
        currency: ''
        external_reference: ''
        flagged_for_review: false
        id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        inserted_at: 2020-04-20T16:20:00Z
        ledger_account_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        opening_balance: 0
        payment_account_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        period_end: 2020-04-20T16:20:00Z
        period_start: 2020-04-20T16:20:00Z
        review_reason: ''
        sar_reference: ''
        snapshot_type: intraday
        status: pending
        tenant_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        total_credit_amount: 0
        total_credit_count: 0
        total_debit_amount: 0
        total_debit_count: 0
        transaction_count: 0
        updated_at: 2020-04-20T16:20:00Z
      properties:
        account_holder_id:
          format: uuid
          type: string
          x-struct:
          x-validate:
        closing_balance:
          description: Balance at period end in minor currency units (camt:053 <Bal> ClosingBooked)
          nullable: true
          type: integer
          x-struct:
          x-validate:
        currency:
          description: ISO 4217 3-letter currency code (e.g. USD, EUR, GBP)
          nullable: true
          type: string
          x-struct:
          x-validate:
        external_reference:
          description: Caller-supplied idempotency key (unique per tenant when set)
          nullable: true
          type: string
          x-struct:
          x-validate:
        flagged_for_review:
          description: AML review flag — true when activity patterns exceed FinCEN AML thresholds (31 CFR §1020.320 SAR requirements)
