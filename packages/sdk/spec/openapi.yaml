              description: ISO 20022 camt:052/camt:053 chart-of-accounts container — one per AccountHolder per currency. Balance is derived on-read by summing child LedgerAccount.balance values. Request
              example:
                account_holder_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
                currency: ''
                ledger_number: ''
                status: active
                tenant_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
              properties:
                account_holder_id:
                  format: uuid
                  type: string
                  x-struct:
                  x-validate:
                currency:
                  description: ISO 4217 three-letter currency code (e.g. USD). Authoritative for the entire ledger hierarchy.
                  type: string
                  x-struct:
                  x-validate:
                ledger_number:
                  description: Opaque external SoE identifier (upsert identity)
                  nullable: true
                  type: string
                  x-struct:
                  x-validate:
                status:
                  enum:
                    - active
                    - closed
                  nullable: true
                  type: string
                  x-struct:
                  x-validate:
                tenant_id:
                  format: uuid
                  type: string
                  x-struct:
                  x-validate:
              required:
                - account_holder_id
                - currency
              title: LedgerRequest
              type: object
              writeOnly: true
              x-order:
                - account_holder_id
                - currency
                - status
                - ledger_number
                - tenant_id
              x-struct: Elixir.AtomicFi.OpenApiSchema.LedgerRequest
              x-validate:
        description: Ledger params
        required: true
      responses:
        '201':
          content:
            application/json:
              schema: Elixir.AtomicFi.OpenApiSchema.LedgerResponse
          description: Ledger created
        '422':
          content:
            application/json:
              schema: Elixir.AtomicFi.OpenApiSchema.ChangesetErrors
          description: Validation errors
      summary: Create ledger
      tags:
        - Ledgers
