servers:
  - description: Local development (iex -S mix phx.server)
    url: http://localhost:4100
    variables: {}
tags:
  - description: System health and status
    name: Health
  - description: Tenant management (requires API key)
    name: Tenants
  - description: User management — email-authenticated accounts scoped to a tenant
    name: Users
  - description: Authorization roles (tenant- and customer-scoped) for users and API keys
    name: Roles
  - description: Customer organisations within a tenant. Each tenant may have zero or more customers — an optional multi-customer-per-tenant segmentation used when a tenant needs to scope users / API keys / roles per customer org. Slug is unique per tenant.
    name: Customers
  - description: Programmatic-access API keys. Each key has exactly one role. The plaintext key is returned ONCE on create — rotate by delete + create.
    name: Api Keys
  - description: Session lifecycle for human Bearer authentication — POST /api/sessions exchanges {email,password,tenant_slug} for a Bearer token; GET /verify returns the current identity; DELETE revokes the Bearer session. X-API-Key callers do not need these endpoints.
    name: Auth
  - description: Tenant-managed internal blocklist — compliance officers add exact or regex terms to block by first_name, last_name, or company_name. The screening engine reads these at runtime via ETS cache (refreshed automatically on create/update/delete).
    name: Blocklist Entries
  - description: ISO 20022 compliance screening — sanctions (OFAC/Watchman), PEP, AML, blocklist (auth:018 / camt:998)
    name: Compliance Screening
  - description: Legal entity identity records (ISO 20022 acmt:007 + FATF CDD)
    name: Legal Entities
  - description: Account holder operational state (ISO 20022 acmt:007 / acmt:019). PII lives in the linked Legal Entity.
    name: Account Holders
  - description: Beneficial owners of corporate account holders (FinCEN CDD Rule 31 CFR §1010.230 / FATF Rec 24). PII lives in the linked Legal Entity.
    name: Beneficial Owners
  - description: External payers/payees (ISO 20022 <Dbtr>/<Cdtr>) that AccountHolders transact with. PII lives in the linked Legal Entity.
    name: Counterparties
  - description: ISO 20022 camt:052/camt:053 chart-of-accounts containers — one per AccountHolder per currency.
    name: Ledgers
  - description: Chart-of-accounts line items within a Ledger (asset, liability, equity, revenue, expense). Stores running balance in minor currency units — atomically updated on entry create/reverse.
    name: Ledger Accounts
  - description: Individual debit/credit line items (ISO 20022 CdtDbtInd). Creating an entry atomically updates the parent LedgerAccount balance via DB trigger. Voiding an entry (status → voided) reverses the balance delta. Velocity limits are enforced by DB CHECK constraints on ledger_account_balances.
    name: Ledger Entries
  - description: Daily balance snapshots for LedgerAccounts (read-only). Created and updated entirely by the ledger_entry_propagate_to_balances DB trigger. Each row carries day/week/month/year cumulative totals and last known velocity limits from the risk engine. Velocity limit enforcement is DB-driven via CHECK constraints.
    name: Ledger Account Balances
  - description: 'KYC verification requirements per FATF scope (CDD Rec 10 / EDD Rec 19 / wire Rec 16 / UBO Rec 24). One row per compliance check action — natural key: (account_holder_id, legal_entity_id, scope, requirement_type). account_holder_id is always the MDM subject; legal_entity_id is the identity being verified.'
    name: KYC Requirements
  - description: Compliance supporting documents (ISO 20022 acmt:007 SupportingDocument). Identity documents, proof of address, UBO declarations, and other KYC artefacts linked to AccountHolders. Physical files are stored out-of-band; this API manages only storage references.
    name: Documents
  - description: 'Payment accounts linked to AccountHolders (ISO 20022 pain:001 <DbtrAcct>/<CdtrAcct>). Gates FATF Recommendation 16 wire transfer compliance. Supports bank accounts, cards, wallets, and crypto wallets. PCI-DSS 4.0: account_number, iban, card_pan must be tokenised before writing.'
    name: Payment Accounts
  - description: 'Payment transactions linked to AccountHolders — full ISO 20022 payment lifecycle. Covers pain:001 (initiation), pacs:008 (interbank), pacs:002 (status), pacs:004 (return/refund), camt:054 (booking notification). FATF Rec 16: debtor/creditor PaymentAccounts must be verified before settlement.'
    name: Transactions
  - description: Periodic account activity summaries for AccountHolders (ISO 20022 camt:052/camt:053). Intraday snapshots map to camt:052 BankToCustomerAccountReport; daily/weekly/monthly snapshots map to camt:053 BankToCustomerStatement. AML fields (flagged_for_review, sar_reference) support FinCEN SAR filing under 31 CFR §1020.320.
    name: Account Activity Snapshots
  - description: Formal risk-level records per AccountHolder (ISO 20022 auth:018 · FATF Rec 10). Drives the LedgerAccount limit cascade — the MASTER LedgerAccount velocity limit is a function of the active RiskClassification.risk_level. Exactly one is_active=true record exists per (holder, tenant) at a time; creating / activating a new one deactivates the prior active record atomically.
    name: Risk Classifications
  - description: Period-level AML monitoring summaries for AccountHolders (FATF Rec 10 · FinCEN 31 CFR §1020.320). Captures KYC / risk-level transitions, screening activity, transaction shape, and SAR candidacy across a reporting window. Distinct from Account Activity Snapshots, which aggregate camt:052/053 ledger activity.
    name: Party Activity Snapshots
  - description: 'Audit log of non-financial identity lifecycle changes (ISO 20022 acmt:006/acmt:002). Auto-created by update_legal_entity via Ecto prepare_changes — captures JSONB diff and previous state. Primary AML signal source for account takeover detection: SIM swap (phone_change), address velocity (address_change), pre-transfer grooming (beneficiary_added/authorised_signer_change).'
    name: Legal Entity Change Events
