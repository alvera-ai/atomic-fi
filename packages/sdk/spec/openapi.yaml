            x-struct:
            x-validate:
        - description: Sort direction (asc or desc)
          example: desc
          in: query
          name: order_directions
          required: false
          schema:
            type: string
            x-struct:
            x-validate:
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerEntryListResponse'
          description: Ledger entry list
      summary: List ledger entries
      tags:
        - Ledger Entries
    post:
      callbacks: {}
      description: |
        Creates a new ledger entry (debit or credit line) and atomically updates the parent LedgerAccount balance.

        - `credit` entry → balance += amount
        - `debit` entry → balance -= amount (returns 422 if balance would go negative — overdraft protection)

        Currency must match the parent LedgerAccount (which inherits from the parent Ledger).
      operationId: AtomicFiApi.LedgerEntryController.create
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              description: Individual debit/credit line item (ISO 20022 CdtDbtInd). Creating an entry atomically updates the parent LedgerAccount balance via DB trigger. Voiding an entry (status → voided) atomically reverses the balance delta. Velocity limit snapshots (*_limit_at_entry) are set by the orchestration layer from the risk engine and are propagated by the trigger to ledger_account_balances.last_*_limit for CHECK constraint enforcement. Request
              example:
                account_holder_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
                amount: 0
                currency: ''
                daily_credit_limit_at_entry: 0
                daily_debit_limit_at_entry: 0
                entry_date: 2020-04-20
                entry_type: credit
                external_entry_id: ''
                ledger_account_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
                monthly_credit_limit_at_entry: 0
                monthly_debit_limit_at_entry: 0
                status: pending
                tenant_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
                weekly_credit_limit_at_entry: 0
                weekly_debit_limit_at_entry: 0
                yearly_credit_limit_at_entry: 0
                yearly_debit_limit_at_entry: 0
              properties:
                account_holder_id:
                  format: uuid
                  type: string
                  x-struct:
                  x-validate:
                amount:
                  description: Amount in minor currency units (e.g. cents for USD). Must be >= 0.
                  type: integer
                  x-struct:
                  x-validate:
                currency:
                  description: ISO 4217 three-letter currency code — inherited from parent LedgerAccount → Ledger.
                  type: string
                  x-struct:
                  x-validate:
                daily_credit_limit_at_entry:
                  description: Daily credit velocity limit at entry creation time. NULL = unconstrained.
                  nullable: true
                  type: integer
                  x-struct:
                  x-validate:
                daily_debit_limit_at_entry:
                  description: Daily debit velocity limit at entry creation time (minor currency units). Supplied by risk engine via orchestration layer. NULL = unconstrained. Trigger copies this to ledger_account_balances.last_daily_debit_limit.
                  nullable: true
                  type: integer
                  x-struct:
                  x-validate:
                entry_date:
                  description: ISO 20022 ValDt — value/settlement date
                  format: date
                  nullable: true
                  type: string
                  x-struct:
                  x-validate:
                entry_type:
                  enum:
                    - credit
                    - debit
                  type: string
                  x-struct:
                  x-validate:
                external_entry_id:
                  description: Opaque external SoE identifier (upsert identity)
                  nullable: true
                  type: string
                  x-struct:
                  x-validate:
                ledger_account_id:
                  format: uuid
                  type: string
                  x-struct:
                  x-validate:
                monthly_credit_limit_at_entry:
                  description: Monthly credit velocity limit at entry creation time. NULL = unconstrained.
                  nullable: true
                  type: integer
                  x-struct:
                  x-validate:
                monthly_debit_limit_at_entry:
                  description: Monthly debit velocity limit at entry creation time. NULL = unconstrained.
                  nullable: true
                  type: integer
                  x-struct:
                  x-validate:
                status:
                  enum:
                    - pending
                    - posted
                    - reversed
                    - voided
                  nullable: true
                  type: string
                  x-struct:
                  x-validate:
                tenant_id:
                  format: uuid
                  type: string
                  x-struct:
                  x-validate:
                weekly_credit_limit_at_entry:
                  description: Weekly credit velocity limit at entry creation time. NULL = unconstrained.
                  nullable: true
                  type: integer
                  x-struct:
                  x-validate:
                weekly_debit_limit_at_entry:
                  description: Weekly debit velocity limit at entry creation time. NULL = unconstrained.
                  nullable: true
                  type: integer
                  x-struct:
                  x-validate:
                yearly_credit_limit_at_entry:
                  description: Yearly credit velocity limit at entry creation time. NULL = unconstrained.
                  nullable: true
                  type: integer
                  x-struct:
                  x-validate:
                yearly_debit_limit_at_entry:
                  description: Yearly debit velocity limit at entry creation time. NULL = unconstrained.
                  nullable: true
                  type: integer
