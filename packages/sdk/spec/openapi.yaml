  securitySchemes:
    ApiKeyAuth:
      description: 'API key for authentication. Include as: x-api-key: your_api_key_here'
      in: header
      name: x-api-key
      type: apiKey
info:
  description: |
    # Introduction

    ## Authentication

    All protected API endpoints require API key authentication. Include your API key in the x-api-key header:

    ```
    x-api-key: your_api_key_here
    ```

    ## Multi-Tenancy

    All resources are scoped to a tenant. Requests automatically use the tenant associated with your API key.

    ## Pagination

    List endpoints support pagination using Flop parameters:
    - `page_size` - Number of items per page (default: 50)
    - `page` - Page number (1-indexed)
    - `order_by` - Fields to sort by
    - `order_directions` - Sort directions (asc/desc)
  title: Payment Compliance Platform API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/tenants/{id}:
    delete:
      callbacks: {}
      description: |
        Deletes a tenant.

        **Authorization**: Requires `platform_admin_api` role.

        **Warning**: This operation will fail if the tenant has dependent records (roles, users, etc.)
        due to database foreign key constraints.
      operationId: AtomicFiApi.TenantController.delete
      parameters:
        - description: Tenant ID
          example: 123e4567-e89b-12d3-a456-426614174000
          in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
            x-struct:
            x-validate:
      responses:
        '204':
          description: Tenant deleted
        '403':
          content:
            application/json:
              schema: Elixir.AtomicFi.OpenApiSchema.ErrorResponse
          description: Insufficient permissions
        '404':
          content:
            application/json:
              schema: Elixir.AtomicFi.OpenApiSchema.ErrorResponse
          description: Not found
        '409':
          content:
            application/json:
              schema: Elixir.AtomicFi.OpenApiSchema.ErrorResponse
          description: Constraint violation
      summary: Delete tenant
      tags:
        - Tenants
    get:
      callbacks: {}
      description: Returns a single tenant by ID. Tenant must belong to the authenticated user's scope.
      operationId: AtomicFiApi.TenantController.show
      parameters:
        - description: Tenant ID
          example: 123e4567-e89b-12d3-a456-426614174000
          in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
            x-struct:
            x-validate:
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResponse'
          description: Tenant
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not found
      summary: Get tenant by ID
      tags:
        - Tenants
    put:
      callbacks: {}
      description: |
        Updates an existing tenant using PUT semantics (full replacement).

        **HTTP Method**: PUT only (PATCH not supported)
        **Semantics**: Send the complete resource representation. All fields should be provided.

        **Authorization**: Requires `platform_admin_api` role.

        **Security Note**: Changing `tenant_type` is not allowed for security reasons.

        **Required fields**: `name`, `tenant_type`
      operationId: AtomicFiApi.TenantController.update
      parameters:
        - description: Tenant ID
          example: 123e4567-e89b-12d3-a456-426614174000
          in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
            x-struct:
            x-validate:
      requestBody:
        content:
          application/json:
            schema:
              description: Tenant schema for multi-tenancy Request
              example:
                id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
                inserted_at: 2020-04-20T16:20:00Z
                metadata: {}
                name: ''
                slug: ''
                status: active
                tenant_type: platform
                updated_at: 2020-04-20T16:20:00Z
              properties:
                id:
                  format: uuid
                  type: string
                  x-struct:
                  x-validate:
                inserted_at:
                  format: date-time
                  type: string
                  x-struct:
                  x-validate:
                metadata:
                  nullable: true
                  type: object
                  x-struct:
                  x-validate:
                name:
                  type: string
                  x-struct:
                  x-validate:
                slug:
                  nullable: true
                  type: string
                  x-struct:
                  x-validate:
                status:
                  enum:
                    - active
                    - suspended
                    - inactive
                  type: string
                  x-struct:
                  x-validate:
                tenant_type:
                  enum:
                    - platform
                    - standard
                  type: string
                  x-struct:
                  x-validate:
                updated_at:
                  format: date-time
                  type: string
                  x-struct:
                  x-validate:
              required:
                - name
                - tenant_type
              title: TenantRequest
              type: object
              writeOnly: true
              x-order:
                - id
                - name
                - slug
                - status
                - tenant_type
                - metadata
                - inserted_at
                - updated_at
              x-struct: Elixir.AtomicFi.OpenApiSchema.TenantRequest
              x-validate:
        description: Tenant params
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: Elixir.AtomicFi.OpenApiSchema.TenantResponse
          description: Tenant updated
        '403':
          content:
            application/json:
              schema: Elixir.AtomicFi.OpenApiSchema.ErrorResponse
          description: Insufficient permissions
        '404':
          content:
            application/json:
              schema: Elixir.AtomicFi.OpenApiSchema.ErrorResponse
          description: Not found
        '422':
          content:
            application/json:
              schema: Elixir.AtomicFi.OpenApiSchema.ChangesetErrors
          description: Validation errors
      summary: Update tenant (full replacement)
      tags:
        - Tenants
