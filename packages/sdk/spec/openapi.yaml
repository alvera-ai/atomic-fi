          x-struct:
          x-validate:
        id:
          format: uuid
          readOnly: true
          type: string
          x-struct:
          x-validate:
        inserted_at:
          format: date-time
          readOnly: true
          type: string
          x-struct:
          x-validate:
        ledger_account_id:
